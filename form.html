<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Juan Diego Castillo">
    <meta name="description" content="Submit a product review by selecting a product, rating it, choosing useful features, and sharing your experience.">    <title>Product Review Form</title>
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>
<body>

<header>
    <h1>Product Review</h1>
</header>

    <main>
        <form method="get" action="review.html">

            <label for="product">Product Name</label>
            <select id="product" name="product" required>
                <option value="" disabled selected>Select a Product ...</option>
            </select>

            <label>Overall Rating</label>
            <div class="rating">
                <label><input type="radio" name="rating" value="1" required> ☆</label>
                <label><input type="radio" name="rating" value="2" required> ☆☆</label>
                <label><input type="radio" name="rating" value="3" required> ☆☆☆</label>
                <label><input type="radio" name="rating" value="4" required> ☆☆☆☆</label>
                <label><input type="radio" name="rating" value="5" required> ☆☆☆☆☆</label>
            </div>

            <label for="installDate">Date of Installation</label>
            <input type="date" id="installDate" name="installDate" required>

            <label>Useful Features</label>

            <label>
                <input type="checkbox" id="durability" name="features" value="Durability">
                Durability
            </label>

            <label>
                <input type="checkbox" id="ease" name="features" value="Ease of Use">
                Ease of Use
            </label>

            <label>
                <input type="checkbox" id="performance" name="features" value="Performance">
                Performance
            </label>

            <label>
                <input type="checkbox" id="design" name="features" value="Design">
                Design
            </label>

            <label for="review">Written Review (Optional)</label>
            <textarea id="review" name="review"></textarea>

            <label for="username">Your Name (Optional)</label>
            <input type="text" id="username" name="username">

            <input type="submit" value="Post Review">

        </form>
    </main>

    <footer>
        <p>
            &copy;<span id="currentyear"></span> | Juan Diego Castillo | Perú
        </p>

        <p id="lastModified"></p>
    </footer>

</body>
</html>
