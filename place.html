<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Discover Peru, its culture, landscapes, weather, and important country information.">
    <meta name="author" content="Juan Diego Castillo">
    <title>Peru</title>

    <link rel="stylesheet" href="styles/place.css">
    <link rel="stylesheet" href="styles/place-large.css">

    <script src="scripts/place.js" defer></script>
</head>
<body>

    <header>
        <h1>Peru</h1>
    </header>

    <main>

        <picture>
            <source srcset="images/lima-fondo.webp" media="(min-width: 768px)">
            <img src="images/macchu-picchu.webp" alt="Peru landscape" class="hero">
        </picture>

        <section class="card data">
            <h2>Data</h2>

            <p><strong>Area:</strong> 1,285,216 km²</p>
            <p><strong>Population:</strong> 34 million</p>
            <p><strong>Capital:</strong> Lima</p>
            <p><strong>Languages:</strong> Spanish, Quechua</p>
            <p><strong>Currency:</strong> Sol</p>
            <p><strong>Time Zone:</strong> UTC -5</p>
            <p><strong>Calling Code:</strong> +51</p>
            <p><strong>Internet TLD:</strong> .pe</p>
        </section>

        <section class="card weather">
            <h2>Weather</h2>

            <img src="images/weather.svg" alt="Weather icon" class="weather-icon">

            <p><strong>Temperature:</strong> <span id="temp">8</span> °C</p>
            <p><strong>Conditions:</strong> Cloudy</p>
            <p><strong>Wind:</strong> <span id="wind">10</span> km/h</p>
            <p><strong>Wind Chill:</strong> <span id="windchill"></span></p>
        </section>

    </main>

    <footer>
        <p>&copy;<span id="year"></span> | Juan Diego Castillo | Perú</p>
        <p>Last Modification: <span id="lastModified"></span></p>
    </footer>

</body>
</html>
